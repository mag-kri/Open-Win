name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(cat VERSION 2>/dev/null || echo '1.0.0')" >> $GITHUB_OUTPUT

      - name: Build release
        run: swift build -c release

      - name: Build app bundle
        run: ./build-app.sh

      - name: Build installer package
        run: ./build-pkg.sh

      - name: Package
        run: |
          zip -r BetterMac-${{ steps.version.outputs.VERSION }}-macos.zip BetterMac.app
          zip -j BetterMac-${{ steps.version.outputs.VERSION }}-binary.zip .build/release/BetterMac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BetterMac-${{ steps.version.outputs.VERSION }}
          path: |
            BetterMac-${{ steps.version.outputs.VERSION }}-macos.zip
            BetterMac-${{ steps.version.outputs.VERSION }}-binary.zip
            build-release/BetterMac-${{ steps.version.outputs.VERSION }}.pkg

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: BetterMac v${{ steps.version.outputs.VERSION }}
          body: |
            ## BetterMac v${{ steps.version.outputs.VERSION }}

            ### Install
            Download the `.pkg` for the easiest install, or use the `.zip` and drag `BetterMac.app` to `/Applications`.

            ### What's included
            - Window snapping (keyboard + Shift+drag)
            - Alt+Tab window switcher
            - Screenshot tool
            - Windows-style click-through
            - Windows-style scroll & mouse acceleration
            - Zone editor with custom layouts
            - Installer package with app + launcher
          files: |
            BetterMac-${{ steps.version.outputs.VERSION }}-macos.zip
            BetterMac-${{ steps.version.outputs.VERSION }}-binary.zip
            build-release/BetterMac-${{ steps.version.outputs.VERSION }}.pkg
