name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: BetterMac
          path: .build/release/BetterMac
