name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build release
        run: swift build -c release

      - name: Build app bundle
        run: ./build-app.sh

      - name: Package
        run: |
          zip -r BetterMac-${{ steps.version.outputs.VERSION }}-macos.zip BetterMac.app
          zip -j bettermac-${{ steps.version.outputs.VERSION }}-binary.zip .build/release/BetterMac

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: BetterMac v${{ steps.version.outputs.VERSION }}
          body: |
            ## BetterMac v${{ steps.version.outputs.VERSION }}

            ### Install
            ```bash
            brew tap mag-kri/bettermac && brew install bettermac
            ```
            Or download the binary below and copy to `/usr/local/bin/bettermac`.

            ### What's included
            - Window snapping (Shift+drag)
            - Alt+Tab window switcher
            - Screenshot tool
            - Focus follows mouse
          files: |
            BetterMac-${{ steps.version.outputs.VERSION }}-macos.zip
            bettermac-${{ steps.version.outputs.VERSION }}-binary.zip
